services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: bigbrain
      POSTGRES_USER: bigbrain
      POSTGRES_PASSWORD: bigbrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

volumes:
  pgdata:
